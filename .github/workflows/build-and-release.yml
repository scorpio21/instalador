name: build-and-release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Versión (ej. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || '1.0.0' }}
      APP_NAME: Instalador
      PROJECT_FILE: Instalador.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determinar versión
        shell: pwsh
        run: |
          if ("${{ startsWith(github.ref, 'refs/tags/v') }}" -eq 'True') {
            $version = "${{ github.ref_name }}".Substring(1)
          } else {
            $version = "${{ env.RELEASE_VERSION }}"
          }
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_FILE }}

      - name: Publish single-file win-x64
        run: >
          dotnet publish ${{ env.PROJECT_FILE }} -c Release -r win-x64 --self-contained true
          /p:PublishSingleFile=true /p:PublishTrimmed=false -o publish/win-x64

      - name: Copiar archivos necesarios
        shell: pwsh
        run: |
          $dest = "publish/win-x64"

          if (Test-Path "config.json") { Copy-Item config.json $dest -Force }
          if (Test-Path "img") { Copy-Item img $dest -Recurse -Force }
          if (Test-Path "Help") { Copy-Item Help $dest -Recurse -Force }
          if (Test-Path "Projects") { Copy-Item Projects $dest -Recurse -Force }

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if ( (Test-Path $iscc) -and (Test-Path "installer.iss") ) {
          & $iscc "/DMyAppVersion=${{ env.RELEASE_VERSION }}" "/O$(pwd)/publish" "installer.iss"
          }

      - name: Crear ZIPs
        shell: pwsh
        run: |
          $version="${{ env.RELEASE_VERSION }}"

          Compress-Archive -Force publish/win-x64/* publish/${{ env.APP_NAME }}_${version}_win-x64.zip
          Compress-Archive -Force publish/win-x64/* publish/${{ env.APP_NAME }}_${version}_Portable.zip

      - name: Upload ZIP win-x64
        uses: actions/upload-artifact@v4
        with:
          name: Instalador_win-x64
          path: publish/${{ env.APP_NAME }}_*_win-x64.zip

      - name: Upload ZIP portable
        uses: actions/upload-artifact@v4
        with:
          name: Portable
          path: publish/${{ env.APP_NAME }}_*_Portable.zip
          retention-days: 7

      - name: Upload installer .exe
        uses: actions/upload-artifact@v4
        with:
          name: Installer
          path: publish/*.exe
          retention-days: 7
          
      - name: Preparar changelog
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref,'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ env.RELEASE_VERSION }}"
          $c = Get-Content CHANGELOG.md

          # Primero intentamos formato: "## [1.0.0]"
          $pattern1 = "## \[$version\]"
          $m = $c | Select-String $pattern1 -SimpleMatch | Select-Object -First 1

          # Si no existe, probamos "## v1.0.0"
          if (-not $m) {
            $pattern2 = "## v$version"
            $m = $c | Select-String $pattern2 -SimpleMatch | Select-Object -First 1
          }

          if (-not $m) { exit 1 }

          $start = $m.LineNumber - 1
          $rest  = $c[$start..($c.Length-1)]
          $next  = $rest | Select-String '^## ' | Select-Object -Skip 1 -First 1

          if ($next) {
            $slice = $rest[0..($next.LineNumber-2)]
          } else {
            $slice = $rest
          }

          Set-Content CHANGELOG_RELEASE.md $slice
     
      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref,'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: Instalador v${{ env.RELEASE_VERSION }}
          body_path: CHANGELOG_RELEASE.md
          files: |
            publish/${{ env.APP_NAME }}_*_win-x64.zip
            publish/${{ env.APP_NAME }}_*_Portable.zip
            publish/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
